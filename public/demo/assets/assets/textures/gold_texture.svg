<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <defs>
        <filter id="noise" x="0%" y="0%" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="2" />
            <feColorMatrix type="saturate" values="0.3" />
            <feBlend mode="overlay" in="SourceGraphic" />
        </filter>

        <linearGradient id="goldBase" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8D6D28" />
            <stop offset="20%" style="stop-color:#B18B31" />
            <stop offset="40%" style="stop-color:#C8AB69" />
            <stop offset="60%" style="stop-color:#D2B981" />
            <stop offset="80%" style="stop-color:#987629" />
            <stop offset="100%" style="stop-color:#D5BE8D" />
        </linearGradient>

        <pattern id="goldTexture" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="url(#goldBase)" />
            <rect width="40" height="40" fill="url(#goldBase)" filter="url(#noise)" opacity="0.5" />

            <!-- Additional subtle pattern layer -->
            <rect width="40" height="40" fill="none" stroke="#D5BE8D" stroke-width="0.5" filter="url(#noise)" opacity="0.2" />
        </pattern>
    </defs>

    <rect width="200" height="200" fill="url(#goldTexture)" />
</svg>